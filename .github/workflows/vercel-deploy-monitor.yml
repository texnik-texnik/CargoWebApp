name: Vercel Deploy Monitor

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  monitor-vercel-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup jq
        run: sudo apt-get install -y jq

      - name: Wait for Vercel Deploy to Start
        run: |
          echo "Waiting 30 seconds for Vercel to detect push and start deployment..."
          sleep 30

      - name: Fetch Vercel Deploy Logs
        id: fetch_logs
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          chmod +x scripts/fetch-vercel-logs.sh
          
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_PROJECT_ID" ] || [ -z "$VERCEL_TEAM_ID" ]; then
            echo "⚠️ Vercel secrets not configured. Falling back to simple check."
            
            # Fallback: just check if site is accessible
            sleep 60
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cargo-web-app-three.vercel.app)
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "result=$([ "$STATUS" = "200" ] && echo 'success' || echo 'pending')" >> $GITHUB_OUTPUT
            echo "has_full_logs=false" >> $GITHUB_OUTPUT
          else
            # Fetch full logs from Vercel API
            scripts/fetch-vercel-logs.sh "$VERCEL_TOKEN" "$VERCEL_PROJECT_ID" "$VERCEL_TEAM_ID"
            echo "has_full_logs=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Deploy Logs
        if: steps.fetch_logs.outputs.has_full_logs == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: vercel-deploy-logs
          path: deploy-logs/
          retention-days: 30

      - name: Create Deploy Status Comment
        if: steps.fetch_logs.outputs.has_full_logs == 'false'
        run: |
          STATUS=${{ steps.fetch_logs.outputs.status }}
          if [ "$STATUS" = "200" ]; then
            echo "## ✅ Vercel Deploy Successful!" >> comment.md
            echo "" >> comment.md
            echo "**Site**: https://cargo-web-app-three.vercel.app" >> comment.md
            echo "**Status Code**: $STATUS" >> comment.md
            echo "" >> comment.md
            echo "> Note: Configure VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_TEAM_ID secrets for full build logs." >> comment.md
          else
            echo "## ⏳ Vercel Deploy In Progress..." >> comment.md
            echo "" >> comment.md
            echo "**Site returned status**: $STATUS" >> comment.md
            echo "" >> comment.md
            echo "Check back in a few minutes or visit [Vercel Dashboard](https://vercel.com/dashboard)" >> comment.md
          fi

      - name: Comment on Commit (Simple Check)
        if: steps.fetch_logs.outputs.has_full_logs == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const comment = fs.readFileSync('comment.md', 'utf8');
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: comment
            });

      - name: Comment on Commit (Full Logs)
        if: steps.fetch_logs.outputs.has_full_logs == 'true'
        uses: actions/github-script@v7
        env:
          DEPLOY_STATE: ${{ steps.fetch_logs.outputs.deployment_state }}
          DEPLOY_URL: ${{ steps.fetch_logs.outputs.deployment_url }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = process.env.DEPLOY_STATE;
            const url = process.env.DEPLOY_URL;
            
            const emoji = state === 'READY' ? '✅' : state === 'ERROR' ? '❌' : '⏳';
            const message = `${emoji} **Vercel Deploy ${state}**

**URL**: https://${url}
**State**: ${state}

Full build logs are attached as artifacts.
            `;
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });
